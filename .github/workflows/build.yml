name: Build Operit2 CLI

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: never
  RUST_BACKTRACE: 1

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/cli/target
          key: linux-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-x86_64-cargo-

      - name: Build CLI (musl static)
        run: |
          cargo build --release --manifest-path apps/cli/Cargo.toml --target x86_64-unknown-linux-musl --jobs 2 2>&1 | tee build.log || {
            echo "===== BUILD FAILED ====="
            echo "=== ERRORS ==="
            grep -E "^(error|Error)" build.log || true
            echo "=== ERRORS WITH CONTEXT ==="
            grep -B2 -A2 "error" build.log | grep -v "warning" | head -60
            echo "=== LAST 30 LINES ==="
            tail -30 build.log
            exit 1
          }

      - name: Verify binary
        run: |
          file apps/cli/target/x86_64-unknown-linux-musl/release/operit2
          apps/cli/target/x86_64-unknown-linux-musl/release/operit2 cli version || true

      - name: Package
        run: |
          mkdir -p dist
          cp apps/cli/target/x86_64-unknown-linux-musl/release/operit2 dist/
          chmod +x dist/operit2
          cd dist && tar czf operit2-cli-linux-x86_64.tar.gz operit2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: operit2-cli-linux-x86_64
          path: dist/operit2-cli-linux-x86_64.tar.gz
