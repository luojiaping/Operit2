[package]
name = "operit-cli"
version = "0.1.0"
edition = "2021"
license = "MIT"
publish = false

[[bin]]
name = "operit2"
path = "src/main.rs"

[dependencies]
crossterm = "0.28"
operit-link = { path = "../../core/crates/operit-link" }
operit-runtime = { path = "../../core/crates/operit-runtime" }
ratatui = "0.28"
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[target.'cfg(windows)'.dependencies]
operit-host-windows-native = { path = "../../hosts/windows" }

[target.'cfg(target_os = "linux")'.dependencies]
operit-host-linux-native = { path = "../../hosts/linux" }
